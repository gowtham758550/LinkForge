<div class="rounded-2xl border border-[var(--border)] bg-[var(--card-bg)] p-5">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="mb-4">
      <label class="mb-1.5 block text-xs font-semibold text-[var(--fg)]">
        Long URL <span class="font-normal text-[var(--muted-fg)]">(required)</span>
      </label>
      <input
        formControlName="longUrl"
        type="url"
        placeholder="https://example.com/very-long-url"
        class="w-full rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2.5 text-sm text-[var(--fg)] placeholder:text-[var(--muted-fg)]/60 transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary/20"
      />
      @if (form.controls.longUrl.invalid && form.controls.longUrl.touched) {
        <p class="mt-1 text-[11px] font-medium text-[var(--danger)]">
          Enter a valid URL starting with http:// or https://
        </p>
      }
    </div>

    <div class="flex items-end gap-3">
      <div class="min-w-0 flex-1">
        <label class="mb-1.5 block text-xs font-semibold text-[var(--fg)]">
          Custom alias <span class="font-normal text-[var(--muted-fg)]">(optional)</span>
        </label>
        <input
          formControlName="customAlias"
          type="text"
          placeholder="my-link"
          class="w-full rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2.5 text-sm text-[var(--fg)] placeholder:text-[var(--muted-fg)]/60 transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary/20"
        />
      </div>
      <div class="min-w-0 flex-1">
        <label class="mb-1.5 block text-xs font-semibold text-[var(--fg)]">
          Expires at <span class="font-normal text-[var(--muted-fg)]">(optional)</span>
        </label>
        <input
          formControlName="expiresAt"
          type="datetime-local"
          class="w-full rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2.5 text-sm text-[var(--fg)] transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary/20"
        />
      </div>
      <button
        type="submit"
        [disabled]="form.invalid || submitting()"
        class="flex shrink-0 items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-[#7a0539] disabled:cursor-not-allowed disabled:opacity-50"
      >
        @if (submitting()) {
          <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
          <span>Shortening…</span>
        } @else {
          <fa-icon [icon]="faLink" class="text-xs" />
          <span>Shorten URL</span>
        }
      </button>
    </div>
  </form>
</div>
