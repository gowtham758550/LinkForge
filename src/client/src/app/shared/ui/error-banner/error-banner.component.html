<div
  role="alert"
  aria-live="assertive"
  class="flex items-center gap-3 rounded-xl border border-[var(--danger-border)] bg-[var(--danger-soft)] px-4 py-3"
>
  <fa-icon [icon]="faExclamation" class="text-[var(--danger)]" />
  <p class="flex-1 text-sm font-medium text-[var(--danger)]">{{ message() }}</p>
  <button
    type="button"
    (click)="dismiss.emit()"
    aria-label="Dismiss"
    class="rounded-md p-1 text-[var(--danger)] transition-colors hover:bg-[var(--danger)]/10"
  >
    <fa-icon [icon]="faXmark" class="text-xs" />
  </button>
</div>
